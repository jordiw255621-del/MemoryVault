      });

    function getQuestionFromData(category) {
      if (!questionsData[category] || questionsData[category].length === 0) {
        return "What question is calling to you right now?";
      }
      return questionsData[category][Math.floor(Math.random() * questionsData[category].length)];
    }

      return getQuestionFromData(category);

    function generateAIQuestion(category) {
      const generator = aiQuestionGenerators[category];
      if (!generator) return "What question is calling to you right now?";

      // Select random theme and structure
      const theme = generator.themes[Math.floor(Math.random() * generator.themes.length)];
      const structure = generator.structures[Math.floor(Math.random() * generator.structures.length)];

      // Replace placeholders with sophisticated word selection
      let question = structure;

      // Replace theme placeholders
      question = question.replace(/\{[^}]+\}/g, (match) => {
        const key = match.slice(1, -1);
        if (generator.themes.includes(key)) {
          return theme;
        }
        const words = aiWordBanks[key];
        if (words) {
          return words[Math.floor(Math.random() * words.length)];
        }
        return match;
      });

      return question;
    }

      const questionText = generateQuestion(actualCategory);
      currentQuestion = { text: questionText, category: actualCategory };

    document.getElementById('questionText').textContent = questionText;
    document.getElementById('questionCategory').textContent = actualCategory.charAt(0).toUpperCase() + actualCategory.slice(1);
    // Make the card visible
    document.querySelector('.question-card').classList.add('visible');
    }

    function copyQuestion() {
      if (!currentQuestion) {
        toast.show('No question to copy', 'error');
        return;
      }

      navigator.clipboard.writeText(currentQuestion.text).then(() => {
        toast.show('Question copied to clipboard');
      }).catch(() => {
        toast.show('Failed to copy question', 'error');
      });
    }

    // Show a random question after page load
    setTimeout(() => {
      getRandomQuestion();
    }, 100);
  </script>
</body>
</html>
