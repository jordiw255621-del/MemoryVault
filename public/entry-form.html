<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Entry - MemoryVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">MemoryVault</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Dashboard
        </a>
        <a href="entries.html" class="active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Entries
        </a>
        <a href="trash.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Trash
        </a>
        <a href="settings.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h4 id="userName">User</h4>
            <p>Personal Account</p>
          </div>
        </div>
        <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header animation-wrapper">
        <div>
          <a href="entries.html" class="btn btn-ghost btn-sm" style="margin-bottom: 12px;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Entries
          </a>
          <h2 id="pageTitle">New Entry</h2>
        </div>
        <div class="header-actions">
          <a href="entries.html" class="btn btn-secondary">Cancel</a>
          <button class="btn btn-primary" id="saveBtn" onclick="saveEntry()">
            <span>Save Entry</span>
            <div class="loading-spinner" style="display:none;"></div>
          </button>
        </div>
      </header>

      <div class="card animation-wrapper" style="max-width: 800px;">
        <div class="input-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Give your entry a title..." required>
        </div>
        <div class="input-group">
          <label for="content">What's on your mind?</label>
          <textarea id="content" placeholder="Write your thoughts..." style="min-height: 250px;"></textarea>
        </div>
        <div class="input-group">
          <label>Photos (optional)</label>
          <div class="photo-gallery" id="photoGallery"></div>
          <div class="upload-area" id="uploadArea">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p>Drag & drop photos here or click to browse</p>
            <small>JPG, PNG, WebP, GIF • Max 10MB each • Up to 10 photos</small>
            <input type="file" id="photoInput" accept="image/jpeg,image/jpg,image/png,image/webp,image/gif" multiple style="display:none;">
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <img src="" alt="Preview" id="lightboxImg">
  </div>

  <script src="/js/main.js"></script>
  <script>
    const user = getUser();
    if (user) {
      const displayName = typeof user === 'string' ? user : (user.username || user.name || user.email || 'User');
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const entryId = urlParams.get('id');
    let currentPhotos = [];
    let uploadedFiles = [];

    if (entryId) {
      document.getElementById('pageTitle').textContent = 'Edit Entry';
      loadEntry(entryId);
    }

    async function loadEntry(id) {
      try {
        const entry = await api.request(`/entries/${id}`);
        document.getElementById('title').value = entry.title;
        document.getElementById('content').value = entry.content;

        if (entry.photos && entry.photos.length > 0) {
          currentPhotos = entry.photos;
          renderPhotos();
        }
      } catch (error) {
        toast.show('Failed to load entry', 'error');
        window.location.href = 'entries.html';
      }
    }

    function renderPhotos() {
      const gallery = document.getElementById('photoGallery');
      gallery.innerHTML = currentPhotos.map(photo => `
        <div class="photo-item">
          <img src="/api/photos/${photo.id}/download" alt="${photo.original_name}" onclick="openLightbox('/api/photos/${photo.id}/download')">
          <button class="delete-photo" onclick="deletePhoto(${photo.id}, event)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      `).join('') + uploadedFiles.map((file, index) => `
        <div class="photo-item">
          <img src="${URL.createObjectURL(file)}" alt="${file.name}" onclick="openLightbox('${URL.createObjectURL(file)}')">
          <button class="delete-photo" onclick="removeUploadedFile(${index}, event)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    const uploadArea = document.getElementById('uploadArea');
    const photoInput = document.getElementById('photoInput');

    uploadArea.addEventListener('click', () => photoInput.click());
    
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    photoInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
      photoInput.value = '';
    });

    function handleFiles(files) {
      const maxPhotos = 10 - currentPhotos.length - uploadedFiles.length;
      const filesToAdd = Array.from(files).slice(0, maxPhotos);

      filesToAdd.forEach(file => {
        if (file.size > 10 * 1024 * 1024) {
          toast.show(`${file.name} is too large (max 10MB)`, 'error');
          return;
        }

        const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'image/gif'];
        if (!validTypes.includes(file.type)) {
          toast.show(`${file.name} is not a valid image type`, 'error');
          return;
        }

        uploadedFiles.push(file);
      });

      renderPhotos();
    }

    function removeUploadedFile(index, event) {
      event.stopPropagation();
      uploadedFiles.splice(index, 1);
      renderPhotos();
    }

    async function deletePhoto(photoId, event) {
      event.stopPropagation();
      modal.show({
        title: 'Delete Photo',
        message: 'Are you sure you want to remove this photo?',
        onConfirm: async () => {
          try {
            await api.request(`/photos/${photoId}`, { method: 'DELETE' });
            currentPhotos = currentPhotos.filter(p => p.id !== photoId);
            renderPhotos();
            toast.show('Photo deleted');
          } catch (error) {
            toast.show('Failed to delete photo', 'error');
          }
        }
      });
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    async function saveEntry() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!title || !content) {
        toast.show('Please fill in title and content', 'error');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      const btnText = saveBtn.querySelector('span');
      const spinner = saveBtn.querySelector('.loading-spinner');

      btnText.style.display = 'none';
      spinner.style.display = 'block';
      saveBtn.disabled = true;

      try {
        let entryData;
        if (entryId) {
          entryData = await api.request(`/entries/${entryId}`, {
            method: 'PUT',
            body: JSON.stringify({ title, content })
          });
        } else {
          entryData = await api.request('/entries', {
            method: 'POST',
            body: JSON.stringify({ title, content })
          });
        }

        if (uploadedFiles.length > 0) {
          const formData = new FormData();
          uploadedFiles.forEach(file => {
            formData.append('photos', file);
          });

          const token = localStorage.getItem('token');
          await fetch(`/api/photos/entry/${entryData.id}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
        }

        toast.show('Entry saved successfully');
        setTimeout(() => {
          window.location.href = 'entries.html';
        }, 1000);
      } catch (error) {
        toast.show(error.message || 'Failed to save entry', 'error');
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        saveBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
