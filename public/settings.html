<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - MemoryVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <h1>MemoryVault</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Dashboard
        </a>
        <a href="entries.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Entries
        </a>
        <a href="trash.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Trash
        </a>
        <a href="settings.html" class="active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h4 id="userName">User</h4>
            <p>Personal Account</p>
          </div>
        </div>
        <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header animation-wrapper">
        <div>
          <h2>Settings</h2>
          <p style="color: var(--text-secondary); margin-top: 8px;">Manage your account and export data</p>
        </div>
      </header>

      <div class="settings-section animation-wrapper">
        <h3>Profile</h3>
        <div class="input-group">
          <label for="profileUsername">Username</label>
          <input type="text" id="profileUsername" disabled>
        </div>
        <div class="input-group">
          <label for="profileEmail">Email</label>
          <input type="email" id="profileEmail" disabled>
        </div>
        <p style="font-size: 13px; color: var(--text-muted);">Contact support to update your profile</p>
      </div>

      <div class="settings-section animation-wrapper">
        <h3>Export Data</h3>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Download your journal data</p>
        <div class="export-buttons">
          <button class="btn btn-secondary" onclick="copyAllText()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012 2h2a2 2 0 012-2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copy All Text
          </button>
          <button class="btn btn-primary" onclick="downloadImages()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Download Images (ZIP)
          </button>
        </div>
      </div>

      <div class="settings-section animation-wrapper danger">
        <h3>Danger Zone</h3>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Irreversible actions</p>
        <button class="btn btn-danger" onclick="deleteAccount()" id="deleteAccBtn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Delete Account
        </button>
      </div>
    </main>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const user = getUser();
    if (user) {
      document.getElementById('userName').textContent = user.username;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
      document.getElementById('profileUsername').value = user.username;
      document.getElementById('profileEmail').value = user.email;
    }

    async function copyAllText() {
      const btn = event.target.closest('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="loading-spinner" style="display:block; margin:0 auto;"></div>';
      btn.disabled = true;

      try {
        const response = await fetch('/api/export/text');
        const text = await response.text();

        await navigator.clipboard.writeText(text);
        
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'my-journal-entries.txt';
        a.click();
        URL.revokeObjectURL(url);

        toast.show('Text copied to clipboard and downloaded');
      } catch (error) {
        toast.show('Failed to export text', 'error');
      }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    async function downloadImages() {
      const btn = event.target.closest('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="loading-spinner" style="display:block; margin:0 auto;"></div>';
      btn.disabled = true;

      try {
        const response = await fetch('/api/export/images');
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error || 'No images to export');
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'MemoryVault-Images.zip';
        a.click();
        URL.revokeObjectURL(url);

        toast.show('Images downloaded');
      } catch (error) {
        toast.show(error.message || 'Failed to download images', 'error');
      }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    function deleteAccount() {
      modal.show({
        title: 'Delete Account',
        message: 'This will permanently delete your account and all journal entries. This action cannot be undone.',
        onConfirm: () => {
          toast.show('Please contact support to delete your account', 'error');
        }
      });
    }
  </script>
</body>
</html>
