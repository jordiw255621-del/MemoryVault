        <a href="entries.html">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>

        <a href="community.html" class="active">

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h4 id="userName">User</h4>
            <p>Personal Account</p>
          </div>
        </div>
        <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header animation-wrapper">
        <div>
          <h2>Community Board</h2>
          <p style="color: var(--text-secondary); margin-top: 8px;">Share and discover thought-provoking questions from the community</p>
        </div>
      </header>

      <div class="community-section animation-wrapper">
        <!-- Add Question Form -->
        <div class="add-question-card">
          <h3>Share a Question</h3>
          <form id="questionForm" onsubmit="submitQuestion(event)">
            <div class="form-group">
              <label for="questionText">Your Question</label>
              <textarea id="questionText" placeholder="What's a deep question that's been on your mind?" required maxlength="500"></textarea>
              <div class="char-count"><span id="charCount">0</span>/500</div>
            </div>
            <div class="form-group">
              <label for="authorName">Name (optional)</label>
              <input type="text" id="authorName" placeholder="Your name or anonymous">
            </div>
            <button type="submit" class="btn btn-primary">Share Question</button>
          </form>
        </div>

        <!-- Questions List -->
        <div class="questions-list" id="questionsList">
          <!-- Questions will be loaded here -->
        </div>

        <!-- Load More -->
        <div class="load-more" id="loadMoreBtn" style="display: none;">
          <button class="btn btn-secondary" onclick="loadMoreQuestions()">Load More Questions</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const user = getUser();
    if (user) {
      const displayName = typeof user === 'string' ? user : (user.username || user.name || user.email || 'User');
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
    }

    let currentPage = 1;
    let isLoading = false;

    // Character count for textarea
    document.getElementById('questionText').addEventListener('input', function() {
      const count = this.value.length;
      document.getElementById('charCount').textContent = count;
    });

    async function loadQuestions(page = 1) {
      if (isLoading) return;
      isLoading = true;

      try {
        // Load questions from localStorage
        const storedQuestions = localStorage.getItem('communityQuestions');
        let allQuestions = storedQuestions ? JSON.parse(storedQuestions) : [];

        // Sort by date descending
        allQuestions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        // Paginate
        const startIndex = (page - 1) * 10;
        const endIndex = startIndex + 10;
        const questions = allQuestions.slice(startIndex, endIndex);

        const container = document.getElementById('questionsList');

        if (page === 1) {
          container.innerHTML = '';
        }

        if (allQuestions.length === 0 && page === 1) {
          container.innerHTML = `
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h3>No questions yet</h3>
              <p>Be the first to share a thought-provoking question!</p>
            </div>
          `;
          document.getElementById('loadMoreBtn').style.display = 'none';
          return;
        }

        questions.forEach((question, index) => {
          const date = new Date(question.created_at).toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
          });

          const questionCard = document.createElement('div');
          questionCard.className = 'question-card animation-wrapper';
          questionCard.style.animationDelay = `${index * 0.1}s`;
          questionCard.innerHTML = `
            <div class="question-header">
              <div class="question-meta">
                <span class="question-author">${question.author || 'Anonymous'}</span>
                <span class="question-date">${date}</span>
              </div>
            </div>
            <div class="question-content">
              <p>${question.text}</p>
            </div>
            <div class="question-actions">
              <button class="btn btn-ghost btn-sm" onclick="copyCommunityQuestion('${question.text.replace(/'/g, "\\'")}')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                </svg>
                Copy
              </button>
            </div>
          `;
          container.appendChild(questionCard);
        });

        // Show load more if there are more questions
        if (endIndex < allQuestions.length) {
          document.getElementById('loadMoreBtn').style.display = 'block';
        } else {
          document.getElementById('loadMoreBtn').style.display = 'none';
        }

        setTimeout(() => {
          document.querySelectorAll('.animation-wrapper').forEach(el => el.classList.add('visible'));
        }, 100);

      } catch (error) {
        console.error('Failed to load questions:', error);
        if (currentPage === 1) {
          document.getElementById('questionsList').innerHTML = `
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h3>Unable to load questions</h3>
              <p>Please try refreshing the page</p>
            </div>
          `;
        }
      } finally {
        isLoading = false;
      }
    }

    function loadMoreQuestions() {
      currentPage++;
      loadQuestions(currentPage);
    }

    async function submitQuestion(event) {
      event.preventDefault();

      const questionText = document.getElementById('questionText').value.trim();
      const authorName = document.getElementById('authorName').value.trim();

      if (!questionText) return;

      try {
        const questionData = {
          id: Date.now().toString(),
          text: questionText,
          author: authorName || null,
          created_at: new Date().toISOString()
        };

        // Save to localStorage
        const storedQuestions = localStorage.getItem('communityQuestions');
        let questions = storedQuestions ? JSON.parse(storedQuestions) : [];
        questions.unshift(questionData); // Add to beginning
        localStorage.setItem('communityQuestions', JSON.stringify(questions));

        toast.show('Question shared successfully!');
        document.getElementById('questionForm').reset();
        document.getElementById('charCount').textContent = '0';

        // Reload questions to show the new one
        currentPage = 1;
        loadQuestions(1);

      } catch (error) {
        console.error('Failed to submit question:', error);
        toast.show('Failed to share question. Please try again.', 'error');
      }
    }

    function copyCommunityQuestion(text) {
      navigator.clipboard.writeText(text).then(() => {
        toast.show('Question copied to clipboard');
      }).catch(() => {
        toast.show('Failed to copy question', 'error');
      });
    }

    // Load initial questions
    loadQuestions();
  </script>
</body>
</html>
