            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h4 id="userName">User</h4>
            <p>Personal Account</p>
          </div>
        </div>
        <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header animation-wrapper">
        <div>
          <a href="entries.html" class="btn btn-ghost btn-sm" style="margin-bottom: 12px;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Entries
          </a>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="copyEntryText()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012 2h2a2 2 0 012-2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copy Text
          </button>
          <button class="btn btn-secondary" onclick="downloadEntryPhotos()" id="downloadPhotosBtn" style="display: none;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Download Photos
          </button>
          <button class="btn btn-secondary" onclick="editEntry()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Edit
          </button>
          <button class="btn btn-danger" onclick="deleteEntry()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Delete
          </button>
        </div>
      </header>

      <div class="card animation-wrapper" style="max-width: 800px;" id="entryContent">
        <p class="entry-date" id="entryDate"></p>
        <h2 id="entryTitle" style="margin-bottom: 24px; font-size: 32px;"></h2>
        <div id="entryBody" style="white-space: pre-wrap; font-size: 16px; line-height: 1.8;"></div>
        <div class="photo-gallery" id="photoGallery" style="margin-top: 32px;"></div>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <img src="" alt="Preview" id="lightboxImg">
  </div>

  <script src="/js/main.js"></script>
  <script>
    const user = getUser();
    if (user) {
      const displayName = typeof user === 'string' ? user : (user.username || user.name || user.email || 'User');
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const entryId = urlParams.get('id');
    let currentEntry = null;
    let currentPhotos = [];

    async function loadEntry() {
      try {
        const entry = await api.request(`/entries/${entryId}`);
        currentEntry = entry;
        
        const dateTime = new Date(entry.created_at).toLocaleString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        });
        document.getElementById('entryDate').textContent = dateTime;
        document.getElementById('entryTitle').textContent = entry.title;
        document.getElementById('entryBody').textContent = entry.content;

        // Check if the entry has photos attached
        if (entry.photos && entry.photos.length > 0) {
          // Store photos for download functionality
          currentPhotos = entry.photos;
          // Show the download photos button
          document.getElementById('downloadPhotosBtn').style.display = 'inline-flex';
          const gallery = document.getElementById('photoGallery');

          // Create placeholder img elements with data attributes for identification
          gallery.innerHTML = entry.photos.map(photo => `
            <div class="photo-item">
              <img src="" alt="${photo.original_name}" data-photo-id="${photo.id}" onclick="openLightboxForPhoto(this)">
            </div>
          `).join('');

          // Load images asynchronously with authentication
          // Since direct img src requests don't include auth headers, we fetch manually
          entry.photos.forEach(async (photo, index) => {
            try {
              // Get the auth token from localStorage
              const token = localStorage.getItem('token');
              const headers = {};
              // Add Authorization header if token exists
              if (token) {
                headers['Authorization'] = `Bearer ${token}`;
              }
              // Fetch the photo as binary data (not JSON)
              const response = await fetch(`/api/photos/${photo.id}/download`, { headers });
              // Convert response to blob
              const blob = await response.blob();
              // Create a temporary URL for the blob
              const url = URL.createObjectURL(blob);
              // Find the corresponding img element and set its src
              const img = gallery.querySelector(`img[data-photo-id="${photo.id}"]`);
              if (img) {
                img.src = url;
                // Store the blob URL for cleanup later
                img.dataset.blobUrl = url;
              }
            } catch (error) {
              console.error('Failed to load photo:', photo.id, error);
            }
          });
        }
      } catch (error) {
        toast.show('Entry not found', 'error');
        window.location.href = 'entries.html';
      }
    }

    function editEntry() {
      window.location.href = `entry-form.html?id=${entryId}`;
    }

    function deleteEntry() {
      modal.show({
        title: 'Delete Entry',
        message: 'This entry will be moved to trash. You can restore it within 30 days.',
        onConfirm: async () => {
          try {
            await api.request(`/entries/${entryId}`, { method: 'DELETE' });
            toast.show('Entry moved to trash');
            setTimeout(() => {
              window.location.href = 'entries.html';
            }, 1000);
          } catch (error) {
            toast.show('Failed to delete entry', 'error');
          }
        }
      });
    }

    // Display the full-size image in the lightbox overlay
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }

    // Close the lightbox overlay
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    // Open lightbox using the blob URL from the img src
    function openLightboxForPhoto(img) {
      openLightbox(img.src);
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    async function copyEntryText() {
      if (!currentEntry) return;
      
      const text = `${currentEntry.title}\n\n${currentEntry.content}`;
      
      try {
        await navigator.clipboard.writeText(text);
        toast.show('Entry text copied to clipboard');
      } catch (error) {
        toast.show('Failed to copy text', 'error');
      }
    }

    async function downloadEntryPhotos() {
      if (currentPhotos.length === 0) return;
      
      const btn = document.getElementById('downloadPhotosBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="loading-spinner" style="display:block; margin:0 auto;"></div>';
      btn.disabled = true;

      try {
        const JSZip = window.JSZip;
        const zip = new JSZip();

        for (let i = 0; i < currentPhotos.length; i++) {
          const photo = currentPhotos[i];
          const token = localStorage.getItem('token');
          const headers = {};
          if (token) {
            headers['Authorization'] = `Bearer ${token}`;
          }
          const response = await fetch(`/api/photos/${photo.id}/download`, { headers });
          if (!response.ok) {
            throw new Error(`Failed to download photo ${photo.original_name}`);
          }
          const blob = await response.blob();
          zip.file(photo.original_name, blob);
        }

        const content = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentEntry.title.replace(/[^a-zA-Z0-9]/g, '_')}_photos.zip`;
        a.click();
        URL.revokeObjectURL(url);

        toast.show('Photos downloaded');
      } catch (error) {
        toast.show('Failed to download photos', 'error');
      }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    // Cleanup blob URLs on page unload to prevent memory leaks
    // Blob URLs created for photo previews should be revoked when leaving the page
    window.addEventListener('beforeunload', () => {
      // Find all img elements with blob URLs stored in dataset
      const images = document.querySelectorAll('#photoGallery img[data-blob-url]');
      images.forEach(img => {
        if (img.dataset.blobUrl) {
          // Revoke the object URL to free up memory
          URL.revokeObjectURL(img.dataset.blobUrl);
        }
      });
    });

    if (entryId) {
      loadEntry();
    } else {
      window.location.href = 'entries.html';
    }
  </script>
</body>
</html>
