<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trash - MemoryVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar">
      <div class="sidebar-logo">

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">MemoryVault</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Dashboard
        </a>
        <a href="entries.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Entries
        </a>
        <a href="trash.html" class="active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Trash
        </a>
        <a href="inspiration.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
          Inspiration
        </a>
        <a href="community.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          Community
        </a>
        <a href="settings.html">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h4 id="userName">User</h4>
            <p>Personal Account</p>
          </div>
        </div>
        <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header animation-wrapper">
        <div>
          <h2>Trash</h2>
          <p style="color: var(--text-secondary); margin-top: 8px;" id="trashCount">Deleted entries</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-danger" onclick="emptyTrash()" id="emptyTrashBtn" style="display: none;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Empty Trash
          </button>
        </div>
      </header>

      <div class="trash-banner animation-wrapper" id="trashBanner" style="display: none;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <p>Entries in trash will be <strong>permanently deleted</strong> after 30 days. This action cannot be undone.</p>
      </div>

      <div class="entries-grid" id="trashList">
      </div>
    </main>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const user = getUser();
    if (user) {
      const displayName = typeof user === 'string' ? user : (user.username || user.name || user.email || 'User');
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
    }

    async function loadTrash() {
      try {
        const entries = await api.request('/trash');
        
        document.getElementById('trashCount').textContent = `${entries.length} deleted entries`;
        
        const container = document.getElementById('trashList');
        const emptyTrashBtn = document.getElementById('emptyTrashBtn');
        const banner = document.getElementById('trashBanner');

        if (entries.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              <h3>Trash is empty</h3>
              <p>Deleted entries will appear here</p>
            </div>
          `;
          emptyTrashBtn.style.display = 'none';
          banner.style.display = 'none';
          return;
        }

        emptyTrashBtn.style.display = 'block';
        banner.style.display = 'flex';

        container.innerHTML = entries.map((entry, index) => {
          const date = new Date(entry.deleted_at).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
          const daysRemaining = entry.days_remaining;
          
          return `
            <div class="entry-card trash-entry animation-wrapper stagger-${(index % 6) + 1}">
              <span class="trash-days">${daysRemaining} days left</span>
              <p class="entry-date">Deleted: ${date}</p>
              <h3 class="entry-title">${entry.title}</h3>
              <p class="entry-preview">${entry.content.substring(0, 150)}...</p>
              <div class="entry-meta">
                <span class="entry-photos" style="display: ${entry.photo_count > 0 ? 'flex' : 'none'}">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                  ${entry.photo_count}
                </span>
              </div>
              <div class="trash-actions">
                <button class="btn btn-secondary btn-sm" onclick="restoreEntry(${entry.id})">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                  Restore
                </button>
                <button class="btn btn-danger btn-sm" onclick="permanentDelete(${entry.id})">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  Delete
                </button>
              </div>
            </div>
          `;
        }).join('');

        setTimeout(() => {
          document.querySelectorAll('.animation-wrapper').forEach(el => el.classList.add('visible'));
        }, 100);
      } catch (error) {
        console.error('Failed to load trash:', error);
      }
    }

    async function restoreEntry(id) {
      try {
        await api.request(`/trash/${id}/restore`, { method: 'POST' });
        toast.show('Entry restored');
        loadTrash();
      } catch (error) {
        toast.show('Failed to restore entry', 'error');
      }
    }

    function permanentDelete(id) {
      modal.show({
        title: 'Permanent Delete',
        message: 'This will permanently delete the entry and all its photos. This action cannot be undone.',
        onConfirm: async () => {
          try {
            await api.request(`/trash/${id}/permanent`, { method: 'DELETE' });
            toast.show('Entry permanently deleted');
            loadTrash();
          } catch (error) {
            toast.show('Failed to delete entry', 'error');
          }
        }
      });
    }

    function emptyTrash() {
      modal.show({
        title: 'Empty Trash',
        message: 'This will permanently delete all entries in trash. This action cannot be undone.',
        onConfirm: async () => {
          try {
            await api.request('/trash/empty', { method: 'DELETE' });
            toast.show('Trash emptied');
            loadTrash();
          } catch (error) {
            toast.show('Failed to empty trash', 'error');
          }
        }
      });
    }

    loadTrash();
  </script>
</body>
</html>
